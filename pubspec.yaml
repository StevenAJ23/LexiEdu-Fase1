name: incluapp
description: Aplicacion de accesibilidad con OCR local y TTS nativo para estudiantes con dislexia y baja vision.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.0+2
  flutter_tts: ^4.0.2
  google_mlkit_text_recognition: ^0.13.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
